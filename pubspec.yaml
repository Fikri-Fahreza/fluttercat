name: fluttercat
description: StreetCat Catcher - Aplikasi komunitas kucing jalanan
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.8.0
  shared_preferences: ^2.3.3

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Location & Map
  geolocator: ^13.0.2
  flutter_map: ^8.1.1
  latlong2: ^0.9.1

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2
  intl: ^0.20.3
  share_plus: ^13.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FAF6F0"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
